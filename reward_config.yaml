# Paths & IDs
dataset_name: "HuggingFaceH4/ultrafeedback_binarized"
reward_model: "Qwen/Qwen3-0.6B"  # alternatively Qwen/Qwen3-1.7B
experiment_name: "granite-grpo-ultrafeedback"
run_name: "reward_model_train"

sample_num: 2000

reward_model_output_dir: "/storage/reward-model"

reward_lora:
    r: 16
    lora_alpha: 32
    target_modules: "all-linear"

reward_training:
    num_train_epochs: 1
    learning_rate: 1.0e-4
    lr_scheduler_type: "cosine"
    warmup_steps: 100
    center_rewards_coefficient: 0.01             # regularizes rewards toward zero mean (Bradley-Terry is underdetermined)
    
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 4
    
    logging_steps: 10
    save_steps: 200
    eval_strategy: "steps"
    eval_steps: 50

    max_length: 512
    model_init_kwargs:
        dtype: "bfloat16"
    
    output_dir: "/storage/reward-model-ckpts"
    report_to: ["mlflow"]

    
